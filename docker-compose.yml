services:
  postgres:
    image: postgres:15-alpine
    container_name: devis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devis}
      POSTGRES_DB: ${POSTGRES_DB:-devis}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devis} -d ${POSTGRES_DB:-devis}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: devis_postgres_data
